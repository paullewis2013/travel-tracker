<!DOCTYPE html>
<html>
<head>
  <title>Travel Map Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <style>
    body { padding: 3rem; }
    h1 { font-family: 'Playfair Display', serif; margin-bottom: 2rem; }
    .section { margin-bottom: 2rem; padding: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
    h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 1rem; }
    a.btn, button { display: inline-block; padding: 0.5rem 1.2rem; background: var(--accent); color: #000; border: none; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 0.8rem; cursor: pointer; text-decoration: none; }
    input[type=file] { color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.8rem; margin-bottom: 1rem; display: block; }
  </style>
</head>
<body>
<h1><span style="color:var(--accent)">Travel</span> Map Admin</h1>

<div class="section">
  <h2>Export Database</h2>
  <a class="btn" href="/admin/export">Download travel-backup.db</a>
</div>

<div class="section">
  <h2>Import Database</h2>
  <form action="/admin/import" method="post" enctype="multipart/form-data">
    <input type="file" name="db" accept=".db"/>
    <button type="submit">Upload & Import</button>
  </form>
</div>

<p style="margin-top:2rem;font-size:0.7rem;color:var(--text-muted)"><a href="/" style="color:var(--text-muted)">← Back to map</a></p>
</body>
</html>
